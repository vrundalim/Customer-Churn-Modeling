<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input[type="number"],
        select{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input[type="number"]:focus,
        select:focus{
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        .radio-group{
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-group label{
            font-weight: normal;
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #008cdd;
        }

        .prediction{
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            color: #222;
            font-weight: bold;
            background: #f3f9ff;
            padding: 15px;
            border-radius: 10px;
        }

        @media(max-width: 600px){
            .container{
                padding: 20px;
            }

            h2{
                font-size: 24px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <form action="/addData">

            <h2>Customer Churn Prediction</h2>

            <div class="form-group">
                <label>Credit Score</label>
                <input type="number" name="cdscore">
            </div>

            <div class="form-group">
                <label>Choose Geography</label>
                <select id="geo" name="geo">
                    <option value="France">France</option>
                    <option value="Germany">Germany</option>
                    <option value="Spain">Spain</option>
                </select>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="Female"> Female
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Male"> Male
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age">
            </div>

            <div class="form-group">
                <label>Tenure</label>
                <input type="number" name="tenure">
            </div>

            <div class="form-group">
                <label>Balance</label>
                <input type="number" name="balance">
            </div>

            <div class="form-group">
                <label>Number Of Products</label>
                <input type="number" name="numproduct">
            </div>

            <div class="form-group">
                <label>Has Credit Card</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="hascr" value="Yes"> Yes
                    </label>

                    <label>
                        <input type="radio" name="hascr" value="No"> No
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Is Active Member</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="isactive" value="Yes"> Yes
                    </label>

                    <label>
                        <input type="radio" name="isactive" value="No"> No
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Estimated Salary</label>
                <input type="number" name="salary">
            </div>

            <button type="submit" name="submit">
                Predict Churn
            </button>

        </form>

        <div class="prediction">
            {{prediction_text}}
        </div>

    </div>

</body>
</html>
